name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-smoke:
    name: Build & smoke test (mock, no API key)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: TypeScript build
        run: npm run build

      - name: Smoke test (example + regression detection)
        run: node scripts/ci-smoke.mjs
