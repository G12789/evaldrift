#   type: ollama
#   model: qwen2.5
#   baseUrl: http://localhost:11434

# llm-judge 用的裁判模型（可选，缺省复用上面的 provider）
# judge:
#   type: openai
#   model: deepseek-chat
#   baseUrl: https://api.deepseek.com/v1
#   apiKeyEnv: DEEPSEEK_API_KEY

prompt:
  system: "你是一个礼貌、专业、简洁的中文客服助手。"
  user: "{{question}}"

# 应用到每个用例的默认断言（可选）
defaultAssert:
  - type: regex
    value: "^[\\s\\S]{8,}$"   # 至少有点内容，别空着

tests:
  - name: 退款问题
    vars: { question: "我想退款，怎么操作？" }
    assert:
      - type: contains
        value: ["退款", "工作日"]
      - type: not-contains
        value: "不支持退款"

  - name: 营业时间
    vars: { question: "你们几点开门？" }
    assert:
      - type: contains
        value: "09:00"

  - name: 礼貌性（裁判打分）
    vars: { question: "你们怎么这么慢，气死我了" }
    assert:
      - type: llm-judge
        rubric: "回复是否保持礼貌、安抚情绪、并给出下一步建议。礼貌且有建设性给高分，敷衍或冷漠给低分。"
        threshold: 0.6
